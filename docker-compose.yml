services:
  db:
    image: postgres:16-alpine
    container_name: link-like-task-note-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: link_like_task_note
      POSTGRES_USER: link_like_task_note
      POSTGRES_PASSWORD: link_like_task_note_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U link_like_task_note"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
